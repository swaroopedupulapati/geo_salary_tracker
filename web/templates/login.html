<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - GeoWork</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      border: none;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      border-radius: 16px;
      overflow: hidden;
    }

    .card-header {
      background: #fff;
      border-bottom: 1px solid #f1f5f9;
      padding: 25px;
      text-align: center;
    }

    .card-header h4 {
      margin: 0;
      font-weight: 700;
      color: #1e293b;
    }

    .card-body {
      padding: 30px;
      background: #fff;
    }

    .form-control {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      margin-bottom: 15px;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      background: #3b82f6;
      border: none;
    }

    .btn-outline-dark {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      color: #94a3b8;
      font-size: 0.85rem;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 45%;
      height: 1px;
      background: #e2e8f0;
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    .alert {
      border-radius: 8px;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <div class="login-card card">
    <div class="card-header">
      <h4>GeoWork Login</h4>
      <p class="text-muted small mb-0">Enter your credentials to access</p>
    </div>
    <div class="card-body">
      {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}

      <form method="post">
        <input name="identifier" class="form-control" placeholder="Employee ID or Email" required autofocus>
        <input type="password" name="password" class="form-control" placeholder="Password" required>
        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>

      <div class="divider">OR</div>

      <form method="get" action="/face/login">
        <input type="hidden" name="username" value=""> <!-- Optional prefill logic later -->
        <button type="submit" class="btn btn-outline-dark">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
            class="bi bi-person-bounding-box me-2" viewBox="0 0 16 16">
            <path
              d="M1.5 1a.5.5 0 0 0-.5.5v3a.5.5 0 0 1-1 0v-3A1.5 1.5 0 0 1 1.5 0h3a.5.5 0 0 1 0 1V.5a.5.5 0 0 0-.5-.5h-3zM11 .5a.5.5 0 0 1 .5-.5h3A1.5 1.5 0 0 1 16 1.5v3a.5.5 0 0 1-1 0v-3a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 1-.5-.5zM.5 11a.5.5 0 0 1 .5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 1 0 1h-3A1.5 1.5 0 0 1 0 14.5v-3a.5.5 0 0 1 .5-.5zm15 0a.5.5 0 0 1 .5.5v3a1.5 1.5 0 0 1-1.5 1.5h-3a.5.5 0 0 1 0-1h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 1 .5-.5z" />
            <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3zm8-9a3 3 0 1 1-6 0 3 3 0 0 1 6 0z" />
          </svg>
          Login with Face
        </button>
      </form>

      <div class="text-center mt-4">
        <small class="text-muted">Contact your Manager to create an account.</small>
      </div>
    </div>
  </div>

</body>

</html>
