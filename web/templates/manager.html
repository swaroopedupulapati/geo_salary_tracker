<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager Dashboard</title>
  <!-- Modern UI -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8f9fa;
    }

    .card {
      border: none;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .card-header {
      background: #fff;
      border-bottom: 1px solid #f1f5f9;
      padding: 15px 20px;
      font-weight: 600;
      border-radius: 12px 12px 0 0 !important;
    }

    .status-badge {
      font-size: 0.8em;
      padding: 5px 10px;
      border-radius: 20px;
    }

    .status-inside {
      background-color: #d1fae5;
      color: #065f46;
    }

    .status-outside {
      background-color: #fee2e2;
      color: #991b1b;
    }

    .status-inactive {
      background-color: #f3f4f6;
      color: #374151;
    }

    .avatar-small {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 10px;
      background: #e5e7eb;
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Manager Dashboard</a>
      <div class="d-flex align-items-center text-white">
        <span class="me-3">Welcome, {{ name }}</span>
        <button class="btn btn-primary btn-sm me-3" data-bs-toggle="modal" data-bs-target="#registerModal">
          <i class="fas fa-plus"></i> New Employee
        </button>
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <!-- Stats Row -->
    <div class="row mb-4">
      <div class="col-md-4">
        <div class="card bg-primary text-white">
          <div class="card-body">
            <h6 class="card-title text-white-50">Total Employees</h6>
            <h2 class="mb-0" id="totalCount">0</h2>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card bg-success text-white">
          <div class="card-body">
            <h6 class="card-title text-white-50">Active Now</h6>
            <h2 class="mb-0" id="activeCount">0</h2>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card bg-info text-white">
          <div class="card-body">
            <h6 class="card-title text-white-50">Inside Geofence</h6>
            <h2 class="mb-0" id="insideCount">0</h2>
          </div>
        </div>
      </div>
    </div>

    <!-- Map Section -->
    <div class="row mb-4">
      <div class="col-12">
        <div class="card">
          <div class="card-header">
            <i class="fas fa-map-marked-alt me-2"></i>Live Employee Map
          </div>
          <div class="card-body p-0">
            <div id="map" style="height: 400px; border-radius: 0 0 12px 12px;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Live Status Table -->
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="fas fa-users-viewfinder me-2"></i>Live Employee Status</span>
        <span class="badge bg-light text-dark" id="lastUpdate">Updating...</span>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Employee</th>
                <th>Status</th>
                <th>Location</th>
                <th>Worked Today</th>
              </tr>
            </thead>
            <tbody id="employeeTableBody">
              <tr>
                <td colspan="4" class="text-center py-4 text-muted">Loading data...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Registration Modal -->
  <div class="modal fade" id="registerModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Register New Employee</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="registerForm">
            <div class="mb-3">
              <label class="form-label">Employee ID</label>
              <input type="text" name="employee_id" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Monthly Salary</label>
              <input type="number" name="monthly_salary" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Temporary Password</label>
              <input type="password" name="password" class="form-control" value="Welcome123" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Face Registration</label>
              <div class="text-center">
                <video id="video" width="100%" height="240" autoplay
                  style="border-radius: 8px; background: #000;"></video>
                <canvas id="canvas" style="display:none;"></canvas>
                <input type="hidden" name="face_image" id="faceImageInput">
                <button type="button" class="btn btn-secondary mt-2 w-100" id="captureBtn">
                  <i class="fas fa-camera"></i> Capture Face
                </button>
                <small id="captureStatus" class="text-muted d-block mt-1"></small>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-3">Create Account</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Camera Logic
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('captureBtn');
    const faceInput = document.getElementById('faceImageInput');
    let stream = null;

    // Start Camera when modal opens
    const registerModal = document.getElementById('registerModal');
    registerModal.addEventListener('shown.bs.modal', async () => {
      try {
        if (!stream) {
          stream = await navigator.mediaDevices.getUserMedia({ video: true });
          video.srcObject = stream;
        }
      } catch (err) {
        console.error("Camera Error:", err);
        alert("Could not access camera. Please allow permissions.");
      }
    });

    // Stop Camera when modal closes
    registerModal.addEventListener('hidden.bs.modal', () => {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
        video.srcObject = null;
      }
    });

    // Capture Face
    captureBtn.addEventListener('click', () => {
      if (!stream) return alert("Camera not active");

      const context = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      context.drawImage(video, 0, 0, canvas.width, canvas.height);

      const dataURL = canvas.toDataURL('image/jpeg');
      faceInput.value = dataURL;

      document.getElementById('captureStatus').innerText = "Face Captured!";
      document.getElementById('captureStatus').className = "text-success d-block mt-1 fw-bold";
      captureBtn.className = "btn btn-success mt-2 w-100";
      captureBtn.innerHTML = '<i class="fas fa-check"></i> Retake';
    });

    // Registration Logic
    document.getElementById('registerForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      if (!faceInput.value) {
        if (!confirm("No face captured! Register without face?")) return;
      }

      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());

      try {
        const res = await fetch('/api/manager/register', {
          method: 'POST',
          body: JSON.stringify(data)
        });
        const result = await res.json();

        if (res.ok) {
          alert("Employee Created Successfully!");
          location.reload();
        } else {
          alert("Error: " + (result.error || "Unknown error"));
        }
      } catch (err) {
        console.error(err);
        alert("Network Error");
      }
    });

    // Map Init
    const map = L.map('map').setView([15.48, 80.02], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Global markers
    const markers = {};
    const initialGeofences = JSON.parse('{{ geofences | tojson | safe }}' || '[]');
    if (initialGeofences && initialGeofences.length > 0) {
      let featureGroup = L.featureGroup();
      initialGeofences.forEach(fence => {
        let layer = L.polygon(fence, { color: 'blue', fillOpacity: 0.1 }).addTo(map);
        featureGroup.addLayer(layer);
      });
      map.fitBounds(featureGroup.getBounds());
    }

    // Dashboard Logic
    function updateDashboard() {
      fetch('/api/manager/live')
        .then(r => r.json())
        .then(data => {

          // Update Map Markers
          const allEmps = [...(data.live || []), ...(data.offline || [])];
          allEmps.forEach(emp => {
            if (emp.lat && emp.lng) {
              if (!markers[emp.id]) {
                markers[emp.id] = L.marker([emp.lat, emp.lng]).addTo(map)
                  .bindPopup(`<b>${emp.name}</b><br>${emp.status}`);
              } else {
                markers[emp.id].setLatLng([emp.lat, emp.lng])
                  .setPopupContent(`<b>${emp.name}</b><br>${emp.status}`);
              }
            }
          });

          // Valid table update logic from previous step
          const tbody = document.getElementById('employeeTableBody');
          tbody.innerHTML = '';

          let total = 0, active = 0, inside = 0;
          const now = new Date().toLocaleTimeString();
          document.getElementById('lastUpdate').innerText = "Last update: " + now;

          allEmps.forEach(emp => {
            total++;
            let status = emp.status || 'OFFLINE';
            if (status !== 'OFFLINE') active++;
            if (status.includes('INSIDE')) inside++;

            let badgeClass = 'status-inactive';
            let icon = '<i class="fas fa-bed"></i>';
            if (status.includes('INSIDE')) { badgeClass = 'status-inside'; icon = '<i class="fas fa-building"></i>'; }
            else if (status.includes('OUTSIDE')) { badgeClass = 'status-outside'; icon = '<i class="fas fa-street-view"></i>'; }

            const locStr = (emp.lat && emp.lng) ? `${emp.lat.toFixed(5)}, ${emp.lng.toFixed(5)}` : 'N/A';
            const hours = Math.floor(emp.worked_minutes / 60);
            const mins = emp.worked_minutes % 60;
            const timeStr = `${hours}h ${mins}m`;

            const row = `
                    <tr>
                        <td>
                            <div class="d-flex align-items-center">
                                <div class="avatar-small d-flex align-items-center justify-content-center fw-bold bg-secondary text-white">
                                    ${emp.name.charAt(0)}
                                </div>
                                <div>
                                    <div class="fw-bold">${emp.name}</div>
                                    <div class="small text-muted">${emp.id}</div>
                                </div>
                            </div>
                        </td>
                        <td><span class="status-badge ${badgeClass}">${icon} ${status}</span></td>
                        <td class="small text-muted">${locStr}</td>
                        <td class="fw-bold text-success">${timeStr}</td>
                    </tr>
                `;
            tbody.innerHTML += row;
          });

          document.getElementById('totalCount').innerText = total;
          document.getElementById('activeCount').innerText = active;
          document.getElementById('insideCount').innerText = inside;

        })
        .catch(err => console.error("Error fetching live data", err));
    }

    setInterval(updateDashboard, 2000);
    updateDashboard();
  </script>
</body>

</html>
