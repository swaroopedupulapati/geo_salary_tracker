<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - GeoWork</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .register-card {
      width: 100%;
      max-width: 500px;
      border: none;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      border-radius: 16px;
      overflow: hidden;
    }

    .card-header {
      background: #fff;
      border-bottom: 1px solid #f1f5f9;
      padding: 25px;
      text-align: center;
    }

    .card-header h4 {
      margin: 0;
      font-weight: 700;
      color: #1e293b;
    }

    .card-body {
      padding: 30px;
      background: #fff;
    }

    .form-control,
    .form-select {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      margin-bottom: 15px;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      background: #10b981;
      border: none;
    }

    .btn-primary:hover {
      background: #059669;
    }

    .form-check-input:checked {
      background-color: #10b981;
      border-color: #10b981;
    }
  </style>
</head>

<body>

  <div class="register-card card">
    <div class="card-header">
      <h4>Create Account</h4>
      <p class="text-muted small mb-0">Join the GeoWork platform</p>
    </div>
    <div class="card-body">
      <form method="post">
        <div class="row">
          <div class="col-6">
            <input name="employee_id" class="form-control" placeholder="Employee ID" required>
          </div>
          <div class="col-6">
            <input name="name" class="form-control" placeholder="Full Name" required>
          </div>
        </div>

        <input name="email" type="email" class="form-control" placeholder="Email Address" required>
        <input name="password" type="password" class="form-control" placeholder="Password" required>

        <div class="row">
          <div class="col-6">
            <input name="monthly_salary" type="number" class="form-control" placeholder="Monthly Salary" required>
          </div>
          <div class="col-6">
            <select name="role" class="form-select" required>
              <option value="">Select Role</option>
              <option value="employee">Employee</option>
              <option value="manager">Manager</option>
            </select>
          </div>
        </div>

        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" name="register_face" value="1" id="faceCheck">
          <label class="form-check-label small text-muted" for="faceCheck">
            Proceed to Face Registration after signup
          </label>
        </div>

        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>

      <div class="text-center mt-4">
        <small class="text-muted">Already have an account? <a href="/login"
            class="text-decoration-none">Login</a></small>
      </div>
    </div>
  </div>

</body>

</html>
